<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินประสิทธิภาพการปฏิบัติงาน</title>
    
    <!-- นำเข้า React และ ReactDOM แบบ CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- นำเข้า Babel สำหรับแปลงโค้ด JSX ให้ทำงานบนเบราว์เซอร์ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- นำเข้า Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* สไตล์พิเศษสำหรับการสั่งพิมพ์กระดาษให้ออกมาเป็น A4 สมบูรณ์แบบ */
        @media print {
            .print\:hidden { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            @page { size: A4; margin: 15mm; } /* ตั้งระยะขอบกระดาษ A4 */
            
            /* ลบเงาและปรับขนาดกล่องให้เต็ม 100% ในหน้าพิมพ์ */
            .max-w-\[210mm\] { 
                max-width: 100% !important; 
                width: 100% !important; 
                margin: 0 !important; 
                box-shadow: none !important; 
                min-height: auto !important;
            }
            .print\:p-0 { padding: 0 !important; }
            
            /* การจัดการตารางและหน้ากระดาษ */
            table { page-break-inside: auto; }
            tr    { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; } /* ให้หัวตารางโผล่ทุกหน้าถ้าเนื้อหายาว */
            
            /* ป้องกันการถูกตัดขาดกลางหน้ากระดาษ (เช่น ลายเซ็นถูกตัดครึ่ง) */
            .break-inside-avoid { 
                page-break-inside: avoid; 
                break-inside: avoid; 
            }
        }
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        /* กำหนดฟอนต์หลักเป็น TH Sarabun PSK ตามหลักสารบรรณ */
        body { font-family: 'TH Sarabun PSK', 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- จุดที่ React จะนำ UI มาแสดงผล -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // ไอคอนทั้งหมด
        // ==========================================
        const Users = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const FileText = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
        const BarChart3 = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/></svg>;
        const LogOut = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const Plus = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const Search = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const Printer = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const CheckCircle = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const ChevronLeft = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
        const Save = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const Edit3 = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;
        const Lock = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const ShieldAlert = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const Edit = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const Trash2 = ({className, ...props}) => <svg className={className} {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;

        // ==========================================
        // การตั้งค่าระบบ URL Google Apps Script
        // ==========================================
        const GOOGLE_SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxQblgAfEKseQSqwk8yPV5ecKZqqVAJ6Xq8P75FLkokSF9hbnB2CPaGrJ1nvjAsfLBDQQ/exec"; 

        const defaultKpi = [
          { id: 1, name: 'อัตราการเสียชีวิตของผู้ป่วยวิกฤตฉุกเฉิน (triage level 1) ภายใน 24 ชม.', target: 5, weight: 20, selfScore: 0, managerScore: 0 },
          { id: 2, name: 'หน้าที่รับผิดชอบหลัก', target: 5, weight: 30, selfScore: 0, managerScore: 0 },
          { id: 3, name: 'พฤติกรรมบริการ', target: 5, weight: 20, selfScore: 0, managerScore: 0 },
          { id: 4, name: 'หน้าที่ที่ได้รับมอบหมาย', target: 5, weight: 20, selfScore: 0, managerScore: 0 },
          { id: 5, name: 'กิจกรรม ๕ส.', target: 5, weight: 10, selfScore: 0, managerScore: 0 },
        ];

        const defaultBehavior = [
          { id: 1, name: 'การมุ่งผลสัมฤทธิ์', target: 5, weight: 30, selfScore: 0, managerScore: 0 },
          { id: 2, name: 'การบริการที่ดี', target: 5, weight: 20, selfScore: 0, managerScore: 0 },
          { id: 3, name: 'การสั่งสมความเชี่ยวชาญในงานอาชีพ', target: 5, weight: 20, selfScore: 0, managerScore: 0 },
          { id: 4, name: 'การยึดมั่นในความถูกต้องคุณธรรมและจริยธรรม', target: 5, weight: 10, selfScore: 0, managerScore: 0 },
          { id: 5, name: 'การทำงานเป็นทีม', target: 5, weight: 20, selfScore: 0, managerScore: 0 },
        ];

        const checkManagerEvaluated = (emp) => {
          if (!emp) return false;
          const kpiDone = emp.kpiData ? emp.kpiData.some(k => k.managerScore > 0) : false;
          const behaviorDone = emp.behaviorData ? emp.behaviorData.some(b => b.managerScore > 0) : false;
          return kpiDone || behaviorDone;
        };

        // ==========================================
        // แอปพลิเคชันหลัก
        // ==========================================
        function PerformanceEvaluationApp() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [currentView, setCurrentView] = useState('dashboard');
          const [employees, setEmployees] = useState([]); 
          const [currentEval, setCurrentEval] = useState(null);
          const [toastMessage, setToastMessage] = useState('');
          const [itemToDelete, setItemToDelete] = useState(null);
          const [isLoadingData, setIsLoadingData] = useState(true);

          // ดึงข้อมูลตอนเปิดหน้าเว็บครั้งแรก
          useEffect(() => {
            const fetchInitialData = async () => {
              if (GOOGLE_SHEET_WEBAPP_URL && GOOGLE_SHEET_WEBAPP_URL !== "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE") {
                try {
                  const response = await fetch(GOOGLE_SHEET_WEBAPP_URL);
                  const data = await response.json();
                  if (Array.isArray(data)) {
                    setEmployees(data.reverse()); // ให้คนล่าสุดอยู่ด้านบน
                  }
                } catch (error) {
                  console.error("Fetch Error:", error);
                  showToast("เชื่อมต่อฐานข้อมูลล้มเหลว หรือยังไม่มีข้อมูล");
                }
              }
              setIsLoadingData(false);
            };
            fetchInitialData();
          }, []);

          const showToast = (msg) => {
            setToastMessage(msg);
            setTimeout(() => setToastMessage(''), 3000);
          };

          const handleDeleteEvaluation = async () => {
            if (itemToDelete) {
              const targetId = itemToDelete.id;
              const targetName = itemToDelete.name || itemToDelete.employeeName;

              setEmployees(employees.filter(e => e.id !== targetId));
              showToast('ลบข้อมูลเรียบร้อยแล้ว');
              setItemToDelete(null);

              if (GOOGLE_SHEET_WEBAPP_URL && GOOGLE_SHEET_WEBAPP_URL !== "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE") {
                try {
                  await fetch(GOOGLE_SHEET_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      action: 'delete',
                      id: targetId,
                      employeeName: targetName
                    }),
                  });
                } catch (error) {
                  console.error('Delete error:', error);
                }
              }
            }
          };

          const handleSaveEvaluation = async (evalData) => {
            if (!evalData) return;

            const isExisting = employees.some(e => e.id === evalData.id);
            
            const recordToSave = {
              ...evalData,
              id: evalData.id || Date.now(),
              name: evalData.employeeName || "ไม่ระบุชื่อ",
              date: evalData.date || new Date().toISOString().split('T')[0]
            };
            
            if (isExisting) {
              setEmployees(employees.map(e => e.id === evalData.id ? recordToSave : e));
            } else {
              setEmployees([recordToSave, ...employees]);
            }
            
            setCurrentEval(recordToSave);
            
            if (GOOGLE_SHEET_WEBAPP_URL === "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE" || !GOOGLE_SHEET_WEBAPP_URL) {
               showToast('บันทึกสำเร็จ (ระบบจำลองข้อมูล)');
               setCurrentView('dashboard');
               return;
            }

            try {
              showToast('กำลังบันทึกข้อมูลไปยัง Google Sheets...');
              await fetch(GOOGLE_SHEET_WEBAPP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  action: 'save',
                  ...recordToSave
                }),
              });
              showToast('บันทึกข้อมูลสำเร็จ!');
              setCurrentView('dashboard');
            } catch (error) {
              console.error(error);
              showToast('บันทึกสำเร็จ (แต่ขัดข้องในการส่งไป G-Sheets)');
              setCurrentView('dashboard');
            }
          };

          // ป้องกันหน้าจอกระพริบตอนกำลังโหลด
          if (isLoadingData) {
            return (
              <div className="flex h-screen w-screen items-center justify-center bg-gray-50">
                <div className="text-center">
                  <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                  <h2 className="text-xl font-bold text-gray-700">กำลังโหลดข้อมูลจากฐานข้อมูล...</h2>
                </div>
              </div>
            );
          }

          return (
            <div className="flex h-screen bg-gray-50 text-gray-800 font-sans">
              {isLoggedIn && (
                <aside className="w-64 bg-slate-900 text-white flex flex-col hidden sm:flex print:hidden">
                  <div className="p-6">
                    <h1 className="text-xl font-bold flex items-center gap-2 text-blue-400">
                      <ShieldAlert className="w-6 h-6" /> ระบบจัดการ (Admin)
                    </h1>
                    <p className="text-xs text-slate-400 mt-1">เฉพาะหัวหน้าผู้ประเมิน</p>
                  </div>
                  <nav className="flex-1 px-4 space-y-2">
                    <NavItem icon={<Users />} label="แดชบอร์ดรวม" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                  </nav>
                </aside>
              )}

              <main className="flex-1 flex flex-col overflow-hidden relative">
                <header className="bg-white shadow-sm h-16 flex items-center justify-between px-6 print:hidden z-10">
                  <div className="flex items-center gap-3">
                    {!isLoggedIn && <BarChart3 className="w-6 h-6 text-blue-600" />}
                    <h2 className="text-xl font-semibold text-gray-800">
                      {currentView === 'dashboard' && 'ระบบประเมินประสิทธิภาพการปฏิบัติงาน'}
                      {currentView === 'form' && 'แบบประเมินประสิทธิภาพและประสิทธิผล'}
                      {currentView === 'print' && 'สรุปผลการประเมินรายบุคคล'}
                      {currentView === 'printAll' && 'ใบสรุปผลรวมทุกรายชื่อ'}
                      {currentView === 'login' && 'เข้าสู่ระบบ'}
                    </h2>
                  </div>
                  
                  <div className="flex items-center gap-4">
                    {isLoggedIn ? (
                      <button onClick={() => setIsLoggedIn(false)} className="flex items-center gap-2 text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors font-medium">
                        <LogOut className="w-5 h-5" /> ออกจากระบบ (wee)
                      </button>
                    ) : (
                      <button onClick={() => setCurrentView('login')} className="flex items-center gap-2 text-slate-600 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg transition-colors font-medium">
                        <Lock className="w-4 h-4" /> สำหรับหัวหน้าประเมิน
                      </button>
                    )}
                  </div>
                </header>

                <div className="flex-1 overflow-auto p-6 relative print:overflow-visible">
                  {toastMessage && (
                    <div className="absolute top-4 right-4 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg flex items-center gap-2 z-50 animate-bounce print:hidden">
                      <CheckCircle className="w-5 h-5" />
                      {toastMessage}
                    </div>
                  )}

                  {itemToDelete && (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 print:hidden">
                      <div className="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full border border-gray-100 animate-in fade-in zoom-in duration-200">
                        <div className="flex items-center gap-3 mb-4 text-red-600">
                          <div className="p-3 bg-red-50 rounded-full">
                            <Trash2 className="w-6 h-6" />
                          </div>
                          <h3 className="text-xl font-bold text-gray-900">ยืนยันการลบข้อมูล</h3>
                        </div>
                        <p className="text-gray-600 mb-6 leading-relaxed">
                          คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลการประเมินของ <br/>
                          <span className="font-bold text-gray-900">{itemToDelete.name || itemToDelete.employeeName}</span> ? <br/>
                          <span className="text-sm text-red-500 mt-2 block">* การกระทำนี้ไม่สามารถย้อนกลับได้</span>
                        </p>
                        <div className="flex justify-end gap-3">
                          <button 
                            onClick={() => setItemToDelete(null)} 
                            className="px-4 py-2 text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors"
                          >
                            ยกเลิก
                          </button>
                          <button 
                            onClick={handleDeleteEvaluation} 
                            className="px-4 py-2 bg-red-600 text-white hover:bg-red-700 rounded-lg font-medium shadow-md transition-colors flex items-center gap-2"
                          >
                            ยืนยันการลบ
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {currentView === 'login' && <LoginScreen onLogin={() => { setIsLoggedIn(true); setCurrentView('dashboard'); }} onCancel={() => setCurrentView('dashboard')} />}
                  
                  {currentView === 'dashboard' && (
                    <DashboardView 
                      isLoggedIn={isLoggedIn}
                      employees={employees} 
                      onNew={() => { setCurrentEval(null); setCurrentView('form'); }} 
                      onEdit={(emp) => { setCurrentEval(emp); setCurrentView('form'); }}
                      onPrint={(emp) => { setCurrentEval(emp); setCurrentView('print'); }} 
                      onPrintAll={() => setCurrentView('printAll')}
                      onDelete={(emp) => setItemToDelete(emp)}
                    />
                  )}
                  
                  {currentView === 'form' && (
                    <EvaluationForm 
                      isLoggedIn={isLoggedIn}
                      initialData={currentEval}
                      employees={employees}
                      onSubmit={handleSaveEvaluation} 
                      onCancel={() => setCurrentView('dashboard')} 
                    />
                  )}
                  
                  {currentView === 'print' && <PrintableView data={currentEval} onBack={() => setCurrentView('dashboard')} />}

                  {currentView === 'printAll' && <PrintAllView employees={employees} onBack={() => setCurrentView('dashboard')} />}
                </div>
              </main>
            </div>
          );
        }

        // ==========================================
        // COMPONENTS ย่อย
        // ==========================================

        function LoginScreen({ onLogin, onCancel }) {
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          const [error, setError] = useState('');

          const handleSubmit = (e) => {
            e.preventDefault();
            if (username === 'wee' && password === '2112') {
              onLogin();
            } else {
              setError('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
            }
          };

          return (
            <div className="flex justify-center items-center h-full">
              <form onSubmit={handleSubmit} className="bg-white p-10 rounded-2xl shadow-md w-full max-w-md border border-gray-100">
                <div className="flex justify-center mb-6">
                  <div className="bg-blue-100 p-4 rounded-full text-blue-600">
                    <Lock className="w-10 h-10" />
                  </div>
                </div>
                <h2 className="text-2xl font-bold text-center text-gray-800 mb-2">เข้าสู่ระบบ (เฉพาะหัวหน้า)</h2>
                <p className="text-center text-gray-500 mb-8 text-sm">เพื่อเข้าถึงการให้คะแนนและดูผลสรุปทั้งหมด</p>
                
                {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm text-center border border-red-100">{error}</div>}

                <div className="mb-4">
                  <label className="block text-sm font-medium text-gray-700 mb-2">ชื่อผู้ใช้งาน</label>
                  <input type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full border border-gray-300 p-3 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none" required />
                </div>
                <div className="mb-8">
                  <label className="block text-sm font-medium text-gray-700 mb-2">รหัสผ่าน</label>
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full border border-gray-300 p-3 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none" required />
                </div>
                <div className="flex gap-3">
                  <button type="button" onClick={onCancel} className="w-1/3 bg-gray-100 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-200 transition-colors">ยกเลิก</button>
                  <button type="submit" className="w-2/3 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-md">เข้าสู่ระบบ</button>
                </div>
              </form>
            </div>
          );
        }

        function NavItem({ icon, label, active, onClick }) {
          return (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${active ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}>
              {React.cloneElement(icon, { className: 'w-5 h-5' })}
              <span>{label}</span>
            </button>
          );
        }

        function DashboardView({ isLoggedIn, employees, onNew, onEdit, onPrint, onDelete, onPrintAll }) {
          const [filter, setFilter] = useState('all');
          const [searchTerm, setSearchTerm] = useState('');

          const filteredEmployees = employees.filter(emp => {
            const matchSearch = (emp.name || emp.employeeName || '').toLowerCase().includes(searchTerm.toLowerCase());
            if (!matchSearch) return false;
            
            const isEvaluated = checkManagerEvaluated(emp);

            if (filter === 'completed') return isEvaluated;
            if (filter === 'pending') return !isEvaluated;
            return true;
          });

          const evaluatedEmployees = employees.filter(e => checkManagerEvaluated(e));
          const avgScore = evaluatedEmployees.length > 0 
            ? (evaluatedEmployees.reduce((sum, e) => sum + Number(e.totalScore || 0), 0) / evaluatedEmployees.length).toFixed(2)
            : "0.00";

          return (
            <div className="space-y-6 max-w-6xl mx-auto">
              
              {isLoggedIn && (
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  <StatCard 
                    title="บุคลากรทั้งหมด" 
                    value={employees.length.toString()} 
                    icon={<Users className="w-8 h-8 text-blue-500" />} 
                    onClick={() => setFilter('all')}
                    active={filter === 'all'}
                  />
                  <StatCard 
                    title="ประเมินครบแล้ว" 
                    value={evaluatedEmployees.length.toString()} 
                    icon={<CheckCircle className="w-8 h-8 text-green-500" />} 
                    onClick={() => setFilter('completed')}
                    active={filter === 'completed'}
                  />
                  <StatCard 
                    title="รอหัวหน้าประเมิน" 
                    value={employees.filter(e => !checkManagerEvaluated(e)).length.toString()} 
                    icon={<BarChart3 className="w-8 h-8 text-orange-500" />} 
                    onClick={() => setFilter('pending')}
                    active={filter === 'pending'}
                  />
                  <StatCard 
                    title="คะแนนเฉลี่ยรวม" 
                    value={avgScore} 
                    icon={<FileText className="w-8 h-8 text-purple-500" />} 
                  />
                </div>
              )}

              <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex-wrap gap-4">
                <div className="relative">
                  <Search className="w-5 h-5 absolute left-3 top-2.5 text-gray-400" />
                  <input 
                    type="text" 
                    placeholder="ค้นหารายชื่อ..." 
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                    className="pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 w-64" 
                  />
                </div>
                <div className="flex gap-3">
                  {isLoggedIn && (
                    <button onClick={onPrintAll} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm">
                      <Printer className="w-5 h-5" /> พิมพ์สรุปผลรวม
                    </button>
                  )}
                  <button onClick={onNew} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm">
                    <Plus className="w-5 h-5" /> สร้างแบบประเมิน (ใหม่)
                  </button>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table className="w-full text-left">
                  <thead className="bg-slate-50 text-slate-700 border-b">
                    <tr>
                      <th className="p-4 font-medium">ชื่อ-นามสกุล</th>
                      <th className="p-4 font-medium">ตำแหน่ง</th>
                      <th className="p-4 font-medium">แผนก/กลุ่มงาน</th>
                      <th className="p-4 font-medium">วันที่ประเมิน</th>
                      {isLoggedIn && (
                        <>
                          <th className="p-4 font-medium text-center">คะแนนเฉลี่ยรวม</th>
                          <th className="p-4 font-medium text-center">ระดับ</th>
                          <th className="p-4 font-medium text-center">จัดการ</th>
                        </>
                      )}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {filteredEmployees.map((emp) => {
                      const isEvaluated = checkManagerEvaluated(emp);
                      return (
                        <tr key={emp.id} className="hover:bg-slate-50 transition-colors">
                          <td className="p-4 font-bold text-gray-800">{emp.name || emp.employeeName || 'ไม่ระบุชื่อ'}</td>
                          <td className="p-4 text-gray-600">{emp.position || ''}</td>
                          <td className="p-4 text-gray-600">{emp.department || ''}</td>
                          <td className="p-4 text-gray-600">{emp.date || ''}</td>
                          
                          {isLoggedIn && (
                            <>
                              <td className="p-4 text-center font-bold text-blue-600">
                                {isEvaluated ? `${emp.totalScore}%` : <span className="text-gray-400 text-sm font-normal">รอหัวหน้าประเมิน</span>}
                              </td>
                              <td className="p-4 text-center">
                                {isEvaluated ? (
                                  <span className={`px-3 py-1 rounded-full text-xs font-medium ${emp.grade === 'ดีเด่น' ? 'bg-green-100 text-green-700' : emp.grade === 'ดีมาก' ? 'bg-blue-100 text-blue-700' : emp.grade === 'ดี' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>
                                    {emp.grade}
                                  </span>
                                ) : (
                                  <span className="text-gray-400">-</span>
                                )}
                              </td>
                              <td className="p-4">
                                <div className="flex justify-center gap-2">
                                  <button onClick={() => onEdit(emp)} className="text-blue-500 hover:text-blue-700 p-2 rounded-lg hover:bg-blue-50 transition-colors" title="แก้ไข/ประเมิน">
                                    <Edit className="w-5 h-5" />
                                  </button>
                                  <button onClick={() => onPrint(emp)} className="text-gray-400 hover:text-slate-700 p-2 rounded-lg hover:bg-slate-100 transition-colors" title="พิมพ์รายบุคคล">
                                    <Printer className="w-5 h-5" />
                                  </button>
                                  <button onClick={() => onDelete(emp)} className="text-red-400 hover:text-red-600 p-2 rounded-lg hover:bg-red-50 transition-colors" title="ลบข้อมูล">
                                    <Trash2 className="w-5 h-5" />
                                  </button>
                                </div>
                              </td>
                            </>
                          )}
                        </tr>
                      );
                    })}
                    {filteredEmployees.length === 0 && (
                      <tr>
                        <td colSpan={isLoggedIn ? 7 : 4} className="p-8 text-center text-gray-500">
                          ไม่พบข้อมูลการประเมิน
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        function StatCard({ title, value, icon, onClick, active }) {
          return (
            <div 
              onClick={onClick}
              className={`bg-white p-6 rounded-xl shadow-sm border flex items-center gap-4 ${onClick ? 'cursor-pointer transition-all hover:-translate-y-1 hover:shadow-md' : ''} ${active ? 'border-blue-500 ring-2 ring-blue-100' : 'border-gray-100'}`}
            >
              <div className="p-3 bg-slate-50 rounded-lg">{icon}</div>
              <div>
                <p className="text-sm text-gray-500 font-medium">{title}</p>
                <p className="text-2xl font-bold text-gray-800">{value}</p>
              </div>
            </div>
          );
        }

        function EvaluationForm({ isLoggedIn, initialData, employees, onSubmit, onCancel }) {
          const [formData, setFormData] = useState(initialData || {
            employeeName: '',
            position: 'พยาบาลวิชาชีพ',
            department: 'งานอุบัติเหตุฉุกเฉินและนิติเวช/กลุ่มการพยาบาล',
            period: 'ครั้งที่ 1 (1 ต.ค. - 31 มี.ค.)',
            evaluatorName: '',
            comments: ''
          });

          const [kpiScores, setKpiScores] = useState(initialData?.kpiData || defaultKpi);
          const [behaviorScores, setBehaviorScores] = useState(initialData?.behaviorData || defaultBehavior);

          const calculateRowAverage = (self, manager) => {
            let sum = 0, count = 0;
            if (self > 0) { sum += Number(self); count++; }
            if (manager > 0) { sum += Number(manager); count++; }
            return count === 0 ? 0 : sum / count;
          };

          const calculateKpiTotal = () => kpiScores.reduce((sum, item) => sum + (calculateRowAverage(item.selfScore, item.managerScore) * (item.weight / 100)), 0);
          const kpiPercentage = (calculateKpiTotal() * 100 / 5) || 0; 

          const calculateBehaviorTotal = () => behaviorScores.reduce((sum, item) => sum + (calculateRowAverage(item.selfScore, item.managerScore) * (item.weight / 100)), 0);
          const behaviorPercentage = (calculateBehaviorTotal() * 100 / 5) || 0;

          const finalScore = (kpiPercentage * 0.70) + (behaviorPercentage * 0.30);
          
          const getGrade = (score) => {
            if (score === 0) return 'รอการประเมิน';
            if (score >= 90) return 'ดีเด่น';
            if (score >= 80) return 'ดีมาก';
            if (score >= 70) return 'ดี';
            if (score >= 60) return 'พอใช้';
            return 'ต้องปรับปรุง';
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!formData.employeeName) {
              alert("กรุณาระบุชื่อผู้รับการประเมิน");
              return;
            }
            
            if (!initialData) {
              const isDuplicate = employees.some(emp => emp.name === formData.employeeName || emp.employeeName === formData.employeeName);
              if (isDuplicate) {
                alert("บุคคลนี้มีแบบประเมินในระบบแล้ว! กรุณากลับไปที่หน้าแรกแล้วกดปุ่ม 'แก้ไข' ที่รายชื่อนั้นแทน");
                return;
              }
            }

            onSubmit({
              ...formData,
              id: initialData?.id || Date.now(),
              kpiData: kpiScores,
              behaviorData: behaviorScores,
              kpiScoreFinal: kpiPercentage,
              behaviorScoreFinal: behaviorPercentage,
              totalScore: finalScore,
              grade: getGrade(finalScore)
            });
          };

          const updateScore = (type, itemId, field, val) => {
            const value = parseFloat(val) || 0;
            if (type === 'kpi') {
              setKpiScores(kpiScores.map(k => k.id === itemId ? { ...k, [field]: value } : k));
            } else {
              setBehaviorScores(behaviorScores.map(b => b.id === itemId ? { ...b, [field]: value } : b));
            }
          };

          const updateKpiName = (id, newName) => {
            setKpiScores(kpiScores.map(k => k.id === id ? { ...k, name: newName } : k));
          };

          return (
            <form onSubmit={handleSubmit} className="max-w-6xl mx-auto bg-white rounded-xl shadow-md overflow-hidden pb-10">
              <div className="bg-blue-600 p-6 text-white flex justify-between items-center">
                <div>
                  <h2 className="text-2xl font-bold">ฟอร์มประเมินการปฏิบัติงาน</h2>
                  <p className="text-blue-100 mt-1">ส่วนที่ 1-4: ข้อมูล, ผลสัมฤทธิ์, พฤติกรรม และสรุป</p>
                </div>
                {isLoggedIn && (
                  <div className="text-right">
                    <p className="text-sm text-blue-200">คะแนนเฉลี่ยสุทธิ</p>
                    <p className="text-4xl font-bold">{finalScore > 0 ? `${finalScore.toFixed(2)}%` : '-'}</p>
                  </div>
                )}
              </div>

              <div className="p-8 space-y-10">
                <section>
                  <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4 border-gray-200 flex items-center gap-2">
                    <span className="bg-blue-100 text-blue-600 px-2 py-1 rounded text-sm">ส่วนที่ 1</span> ข้อมูลผู้รับการประเมิน
                  </h3>
                  <div className="grid grid-cols-2 gap-6 mb-6">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล (ผู้รับการประเมิน)</label>
                      <input type="text" required value={formData.employeeName || formData.name || ''} onChange={e => setFormData({...formData, employeeName: e.target.value})} disabled={!!initialData && !isLoggedIn} className={`w-full border rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 ${!!initialData && !isLoggedIn ? 'bg-gray-100 text-gray-500' : 'border-gray-300'}`} placeholder="ระบุชื่อ-นามสกุล" />
                      {!!initialData && !isLoggedIn && <p className="text-xs text-red-500 mt-1">*ไม่สามารถเปลี่ยนชื่อได้เมื่อสร้างแล้ว</p>}
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">ตำแหน่ง</label>
                      <select 
                        value={formData.position || 'พยาบาลวิชาชีพ'} 
                        onChange={e => setFormData({...formData, position: e.target.value})} 
                        className="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50 focus:ring-blue-500 focus:border-blue-500"
                      >
                        <option value="พยาบาลวิชาชีพ">พยาบาลวิชาชีพ</option>
                        <option value="เจ้าพนักงานเวชกิจฉุกเฉิน">เจ้าพนักงานเวชกิจฉุกเฉิน</option>
                        <option value="ผู้ช่วยพยาบาล">ผู้ช่วยพยาบาล</option>
                        <option value="ผู้ช่วยเหลือคนไข้">ผู้ช่วยเหลือคนไข้</option>
                        <option value="พนักงานเปล">พนักงานเปล</option>
                        <option value="พนักงานบริการ">พนักงานบริการ</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">งาน/กลุ่มงาน</label>
                      <input type="text" value={formData.department || ''} onChange={e => setFormData({...formData, department: e.target.value})} className="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50 focus:ring-blue-500 focus:border-blue-500" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">รอบการประเมิน</label>
                      <select value={formData.period || ''} onChange={e => setFormData({...formData, period: e.target.value})} className="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50 focus:ring-blue-500 focus:border-blue-500">
                        <option>ครั้งที่ 1 (1 ต.ค. - 31 มี.ค.)</option>
                        <option>ครั้งที่ 2 (1 เม.ย. - 30 ก.ย.)</option>
                      </select>
                    </div>
                  </div>
                </section>

                <section>
                  <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4 border-gray-200 flex items-center gap-2 justify-between">
                    <div><span className="bg-blue-100 text-blue-600 px-2 py-1 rounded text-sm">ส่วนที่ 2</span> การประเมินผลสัมฤทธิ์ของงาน (น้ำหนัก 70%)</div>
                    <div className="text-sm font-normal text-gray-500">คะแนนเต็ม 5</div>
                  </h3>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left">
                      <thead className="bg-slate-50 text-slate-700 border border-slate-200">
                        <tr>
                          <th className="p-3">ตัวชี้วัด/ผลงาน</th>
                          <th className="p-3 w-20 text-center">เป้าหมาย</th>
                          <th className="p-3 w-20 text-center">น้ำหนัก</th>
                          <th className="p-3 w-32 text-center text-blue-700">ประเมินตนเอง</th>
                          <th className="p-3 w-32 text-center text-purple-700">
                            หัวหน้าประเมิน {(!isLoggedIn) && <Lock className="inline w-3 h-3 ml-1"/>}
                          </th>
                          {isLoggedIn && (
                            <>
                              <th className="p-3 w-24 text-center bg-yellow-50 font-bold">คะแนนเฉลี่ย</th>
                              <th className="p-3 w-24 text-center bg-blue-50">ผลลัพธ์</th>
                            </>
                          )}
                        </tr>
                      </thead>
                      <tbody>
                        {kpiScores.map((item) => (
                          <tr key={item.id} className="border-b border-x border-slate-200">
                            <td className="p-3 font-medium text-gray-700 align-top">
                              {item.id === 1 ? (
                                <div className="flex gap-2">
                                  <span className="mt-2">{item.id}.</span>
                                  <div className="flex-1 relative">
                                    <textarea value={item.name || ''} onChange={(e) => updateKpiName(item.id, e.target.value)} className="w-full border border-blue-300 rounded-md p-2 bg-blue-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" rows="2" placeholder="ระบุตัวชี้วัด..." />
                                    <Edit3 className="w-4 h-4 text-blue-400 absolute right-2 top-2 pointer-events-none" />
                                  </div>
                                </div>
                              ) : (
                                <div className="pt-2">{item.id}. {item.name}</div>
                              )}
                            </td>
                            <td className="p-3 text-center bg-slate-50 align-middle">{item.target}</td>
                            <td className="p-3 text-center align-middle">{item.weight} %</td>
                            
                            <td className="p-3 text-center align-middle bg-blue-50">
                              <select value={item.selfScore || 0} onChange={(e) => updateScore('kpi', item.id, 'selfScore', e.target.value)} className="w-full p-2 border border-blue-200 rounded text-center">
                                <option value="0">-</option>
                                {[1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}
                              </select>
                            </td>

                            <td className="p-3 text-center align-middle bg-purple-50">
                              <select value={item.managerScore || 0} onChange={(e) => updateScore('kpi', item.id, 'managerScore', e.target.value)} disabled={!isLoggedIn} className={`w-full p-2 border rounded text-center ${!isLoggedIn ? 'bg-gray-100 cursor-not-allowed border-gray-200' : 'border-purple-200'}`}>
                                <option value="0">-</option>
                                {[1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}
                              </select>
                            </td>

                            {isLoggedIn && (
                              <>
                                <td className="p-3 text-center align-middle bg-yellow-50 font-bold text-yellow-800">
                                  {calculateRowAverage(item.selfScore, item.managerScore).toFixed(2)}
                                </td>
                                <td className="p-3 text-center font-bold text-blue-600 bg-blue-50 align-middle">
                                  {(calculateRowAverage(item.selfScore, item.managerScore) * (item.weight / 100)).toFixed(2)}
                                </td>
                              </>
                            )}
                          </tr>
                        ))}
                        
                        {isLoggedIn && (
                          <tr className="bg-slate-100 font-bold border-b border-x border-slate-200">
                            <td colSpan={2} className="p-3 text-right">รวม</td>
                            <td className="p-3 text-center">100 %</td>
                            <td colSpan={4} className="p-3 text-right text-blue-700">
                              รวม {calculateKpiTotal().toFixed(2)} = {kpiPercentage.toFixed(2)}%
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </section>

                <section>
                  <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4 border-gray-200 flex items-center gap-2">
                    <span className="bg-blue-100 text-blue-600 px-2 py-1 rounded text-sm">ส่วนที่ 3</span> การประเมินพฤติกรรมการปฏิบัติงาน (น้ำหนัก 30%)
                  </h3>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left">
                      <thead className="bg-slate-50 text-slate-700 border border-slate-200">
                        <tr>
                          <th className="p-3">สมรรถนะ</th>
                          <th className="p-3 w-20 text-center">เป้าหมาย</th>
                          <th className="p-3 w-20 text-center">น้ำหนัก</th>
                          <th className="p-3 w-32 text-center text-blue-700">ประเมินตนเอง</th>
                          <th className="p-3 w-32 text-center text-purple-700">
                            หัวหน้าประเมิน {(!isLoggedIn) && <Lock className="inline w-3 h-3 ml-1"/>}
                          </th>
                          {isLoggedIn && (
                            <>
                              <th className="p-3 w-24 text-center bg-yellow-50 font-bold">คะแนนเฉลี่ย</th>
                              <th className="p-3 w-24 text-center bg-blue-50">ผลลัพธ์</th>
                            </>
                          )}
                        </tr>
                      </thead>
                      <tbody>
                        {behaviorScores.map((item) => (
                          <tr key={item.id} className="border-b border-x border-slate-200">
                            <td className="p-3 font-medium text-gray-700 align-middle">{item.id}. {item.name}</td>
                            <td className="p-3 text-center bg-slate-50 align-middle">{item.target}</td>
                            <td className="p-3 text-center align-middle">{item.weight} %</td>
                            
                            <td className="p-3 text-center align-middle bg-blue-50">
                              <select value={item.selfScore || 0} onChange={(e) => updateScore('behavior', item.id, 'selfScore', e.target.value)} className="w-full p-2 border border-blue-200 rounded text-center">
                                <option value="0">-</option>
                                {[1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}
                              </select>
                            </td>

                            <td className="p-3 text-center align-middle bg-purple-50">
                              <select value={item.managerScore || 0} onChange={(e) => updateScore('behavior', item.id, 'managerScore', e.target.value)} disabled={!isLoggedIn} className={`w-full p-2 border rounded text-center ${!isLoggedIn ? 'bg-gray-100 cursor-not-allowed border-gray-200' : 'border-purple-200'}`}>
                                <option value="0">-</option>
                                {[1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}
                              </select>
                            </td>

                            {isLoggedIn && (
                              <>
                                <td className="p-3 text-center align-middle bg-yellow-50 font-bold text-yellow-800">
                                  {calculateRowAverage(item.selfScore, item.managerScore).toFixed(2)}
                                </td>
                                <td className="p-3 text-center font-bold text-blue-600 bg-blue-50 align-middle">
                                  {(calculateRowAverage(item.selfScore, item.managerScore) * (item.weight / 100)).toFixed(2)}
                                </td>
                              </>
                            )}
                          </tr>
                        ))}
                        
                        {isLoggedIn && (
                          <tr className="bg-slate-100 font-bold border-b border-x border-slate-200">
                            <td className="p-3 text-right">รวม</td>
                            <td className="p-3 text-center">100 %</td>
                            <td colSpan={4} className="p-3 text-right text-blue-700">
                              รวม {calculateBehaviorTotal().toFixed(2)} = {behaviorPercentage.toFixed(2)}%
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </section>

                {isLoggedIn && (
                  <section className="bg-green-50 border border-green-200 rounded-xl p-6 relative overflow-hidden mt-8">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-green-100 rounded-full -mr-16 -mt-16 opacity-50"></div>
                    <h3 className="text-xl font-bold text-green-800 mb-4 flex items-center gap-2">
                      <FileText className="w-6 h-6" /> สรุปผลการประเมิน (ส่วนที่ 4)
                    </h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
                      <div className="bg-white p-4 rounded-lg shadow-sm">
                        <p className="text-sm text-gray-500">ผลสัมฤทธิ์ (70%)</p>
                        <p className="text-2xl font-bold text-gray-800">{kpiPercentage.toFixed(2)} <span className="text-sm text-gray-400">เฉลี่ยดิบ</span></p>
                        <p className="text-green-600 font-bold mt-1 text-lg">{(kpiPercentage * 0.7).toFixed(2)} <span className="text-sm">หลังถ่วงน้ำหนัก</span></p>
                      </div>
                      <div className="bg-white p-4 rounded-lg shadow-sm">
                        <p className="text-sm text-gray-500">พฤติกรรม (30%)</p>
                        <p className="text-2xl font-bold text-gray-800">{behaviorPercentage.toFixed(2)} <span className="text-sm text-gray-400">เฉลี่ยดิบ</span></p>
                        <p className="text-green-600 font-bold mt-1 text-lg">{(behaviorPercentage * 0.3).toFixed(2)} <span className="text-sm">หลังถ่วงน้ำหนัก</span></p>
                      </div>
                      <div className="bg-green-600 p-4 rounded-lg shadow-sm text-white flex flex-col justify-center items-center">
                        <p className="text-sm text-green-100">คะแนนเฉลี่ยสุทธิ</p>
                        <p className="text-4xl font-black">{finalScore.toFixed(2)}</p>
                        <p className="bg-white text-green-700 px-3 py-1 rounded-full text-sm font-bold mt-2 shadow-sm">
                          ระดับ: {getGrade(finalScore)}
                        </p>
                      </div>
                    </div>

                    <div className="mt-6 grid grid-cols-2 gap-6">
                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-2">ความคิดเห็นเพิ่มเติมของผู้ประเมิน</label>
                        <textarea rows="3" value={formData.comments || ''} onChange={e => setFormData({...formData, comments: e.target.value})} className="w-full border border-gray-300 rounded-lg p-3 bg-white focus:ring-green-500 focus:border-green-500" placeholder="ระบุความคิดเห็น จุดเด่น จุดที่ควรพัฒนา..."></textarea>
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-2">ชื่อผู้ประเมิน (หัวหน้า)</label>
                        <input type="text" value={formData.evaluatorName || ''} onChange={e => setFormData({...formData, evaluatorName: e.target.value})} className="w-full border border-gray-300 rounded-lg p-3 bg-white focus:ring-green-500 focus:border-green-500" placeholder="ลงชื่อผู้ประเมิน"/>
                      </div>
                    </div>
                  </section>
                )}

                {!isLoggedIn && (
                  <div className="bg-blue-50 text-blue-800 p-4 rounded-lg border border-blue-200 mt-4 text-sm flex gap-3">
                     <div className="mt-0.5"><Lock className="w-5 h-5 text-blue-500"/></div>
                     <div>
                       <p className="font-bold mb-1">ส่วนสำหรับผู้รับการประเมิน (ประเมินตนเอง)</p>
                       <p>คุณสามารถให้คะแนนในคอลัมน์ "ประเมินตนเอง" เท่านั้น สำหรับคอลัมน์ "หัวหน้าประเมิน" และส่วนสรุปผล จะสามารถเข้าถึงได้เมื่อผู้ประเมินเข้าสู่ระบบแล้วเท่านั้น</p>
                     </div>
                  </div>
                )}

                <div className="flex justify-end gap-4 border-t pt-6">
                  <button type="button" onClick={onCancel} className="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 font-medium">
                    ยกเลิก
                  </button>
                  <button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium flex items-center gap-2 shadow-md">
                    <Save className="w-5 h-5" /> บันทึกข้อมูล
                  </button>
                </div>
              </div>
            </form>
          );
        }

        // ==========================================
        // คอมโพเนนต์สำหรับ พิมพ์ใบรวมทุกรายชื่อ (ลื่นไหลตามจำนวนคน)
        // ==========================================
        function PrintAllView({ employees, onBack }) {
          useEffect(() => {
            window.scrollTo(0, 0);
          }, []);

          return (
            <div className="max-w-[210mm] mx-auto bg-white shadow-xl mb-10 print:shadow-none print:m-0">
              <div className="bg-slate-800 text-white p-4 flex justify-between items-center print:hidden rounded-t-lg">
                <button onClick={onBack} className="flex items-center gap-2 hover:text-blue-300 transition-colors">
                  <ChevronLeft className="w-5 h-5" /> กลับไปแดชบอร์ด
                </button>
                <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded flex items-center gap-2 font-medium shadow-sm transition-colors">
                  <Printer className="w-5 h-5" /> สั่งพิมพ์ใบรวม (Print All)
                </button>
              </div>

              {/* บังคับฟอนต์ TH Sarabun PSK และขนาดข้อความปกติที่ 16pt */}
              <div className="p-8 print:p-0 text-black bg-white font-['TH_Sarabun_PSK','Sarabun',sans-serif] text-[16pt] leading-[1.3]">
                <div className="text-center mb-6">
                  <h1 className="text-[18pt] font-bold mb-1">ใบสรุปผลการประเมินประสิทธิภาพการปฏิบัติงาน (รวมทุกรายชื่อ)</h1>
                  <h2 className="text-[18pt] font-normal">งานอุบัติเหตุฉุกเฉินและนิติเวช</h2>
                  <h2 className="text-[18pt] font-normal">โรงพยาบาลเสลภูมิ</h2>
                  <h2 className="text-[18pt] font-normal">สังกัดสำนักงานปลัดกระทรวงสาธารณสุข</h2>
                </div>

                {/* ตารางจะไหลหน้ากระดาษและมีหัวตารางทุกหน้าอัตโนมัติ */}
                <table className="w-full border-collapse border border-black mt-4">
                  <thead>
                    <tr className="bg-gray-100 text-center font-bold">
                      <th className="border border-black p-2 w-16">ลำดับ</th>
                      <th className="border border-black p-2">ชื่อ-สกุล</th>
                      <th className="border border-black p-2">ตำแหน่ง</th>
                      <th className="border border-black p-2 w-32">ผลคะแนนรวม</th>
                      <th className="border border-black p-2 w-32">ผลการประเมิน</th>
                    </tr>
                  </thead>
                  <tbody>
                    {employees.map((emp, index) => {
                      const isEvaluated = checkManagerEvaluated(emp);
                      const score = emp.totalScore || 0;
                      let resultText = '-';
                      let resultClass = '';
                      
                      if (isEvaluated) {
                        if (score >= 60) {
                          resultText = 'ผ่าน';
                          resultClass = 'text-green-600 print:text-black';
                        } else {
                          resultText = 'ไม่ผ่าน';
                          resultClass = 'text-red-600 print:text-black';
                        }
                      } else {
                        resultText = 'รอประเมิน';
                        resultClass = 'text-gray-500 font-normal print:text-black';
                      }

                      return (
                        <tr key={emp.id}>
                          <td className="border border-black p-2 text-center">{index + 1}</td>
                          <td className="border border-black p-2">{emp.name || emp.employeeName || 'ไม่ระบุชื่อ'}</td>
                          <td className="border border-black p-2">{emp.position || '-'}</td>
                          <td className="border border-black p-2 text-center">{isEvaluated ? score.toFixed(2) : '-'}</td>
                          <td className={`border border-black p-2 text-center font-bold ${resultClass}`}>
                            {resultText}
                          </td>
                        </tr>
                      );
                    })}
                    {employees.length === 0 && (
                      <tr>
                        <td colSpan="5" className="border border-black p-6 text-center text-gray-500">
                          ยังไม่มีข้อมูลผู้รับการประเมินในระบบ
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
                
                {/* ลายเซ็นด้านล่าง (ป้องกันการถูกตัดแยกหน้า) */}
                <div className="mt-12 flex flex-col items-center gap-12 break-inside-avoid">
                   <div className="text-center">
                      <p className="mb-8 font-bold text-[18pt]">ผู้รายงาน</p>
                      <p className="whitespace-nowrap">( นายทวี แสนสนอง )</p>
                      <p className="mt-1 whitespace-nowrap">ตำแหน่ง หัวหน้างานการพยาบาลอุบัติเหตุฉุกเฉินและนิติเวช</p>
                      <p className="mt-1">วันที่ ......../......../..........</p>
                    </div>
                   <div className="text-center">
                      <p className="mb-8 font-bold text-[18pt]">ผู้รับรองข้อมูล</p>
                      <p className="whitespace-nowrap">( ........................................... )</p>
                      <p className="mt-1 whitespace-nowrap">ตำแหน่ง หัวหน้ากลุ่มงานการพยาบาล</p>
                      <p className="mt-1">วันที่ ......../......../..........</p>
                    </div>
                </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // คอมโพเนนต์สำหรับ พิมพ์รายบุคคล (บังคับลง 1-2 หน้า)
        // ==========================================
        function PrintableView({ data, onBack }) {
          useEffect(() => {
            window.scrollTo(0, 0);
          }, []);

          if (!data) return <div className="text-center p-10">ไม่พบข้อมูล กรุณากลับไปเลือกจากแดชบอร์ด</div>;

          return (
            <div className="max-w-[210mm] mx-auto bg-white shadow-xl mb-10 print:shadow-none print:m-0">
              <div className="bg-slate-800 text-white p-4 flex justify-between items-center print:hidden rounded-t-lg">
                <button onClick={onBack} className="flex items-center gap-2 hover:text-blue-300 transition-colors">
                  <ChevronLeft className="w-5 h-5" /> กลับไปแดชบอร์ด
                </button>
                <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded flex items-center gap-2 font-medium shadow-sm transition-colors">
                  <Printer className="w-5 h-5" /> สั่งพิมพ์รายบุคคล (Print)
                </button>
              </div>

              {/* บังคับฟอนต์ TH Sarabun PSK และขนาดข้อความปกติที่ 16pt ปรับลด padding เพื่อให้ชิดกรอบพอดี 1-2 หน้า */}
              <div className="p-8 print:p-0 text-black bg-white font-['TH_Sarabun_PSK','Sarabun',sans-serif] text-[16pt] leading-[1.3]">
                <div className="text-center mb-4">
                  <h1 className="text-[18pt] font-bold mb-1">ใบสรุปผลการประเมินประสิทธิภาพการปฏิบัติงาน</h1>
                  <h2 className="text-[18pt] font-normal">งานอุบัติเหตุฉุกเฉินและนิติเวช</h2>
                  <h2 className="text-[18pt] font-normal">โรงพยาบาลเสลภูมิ</h2>
                  <h2 className="text-[18pt] font-normal">สังกัดสำนักงานปลัดกระทรวงสาธารณสุข</h2>
                </div>

                <div className="mb-4">
                  <h3 className="text-[18pt] font-bold mb-1">ส่วนที่ ๑ ข้อมูลของผู้รับการประเมิน</h3>
                  <div className="grid grid-cols-2 gap-y-1 gap-x-6 pl-4">
                    <div className="col-span-2">
                      <span className="font-bold">ชื่อผู้เข้ารับการประเมิน: </span> {data.employeeName || data.name}
                    </div>
                    <div>
                      <span className="font-bold">ตำแหน่ง: </span> {data.position}
                    </div>
                    <div>
                      <span className="font-bold">งาน/กลุ่มงาน: </span> {data.department}
                    </div>
                    <div className="col-span-2">
                      <span className="font-bold">รอบการประเมิน: </span> {data.period || 'ครั้งที่ 1 (1 ต.ค. - 31 มี.ค.)'}
                    </div>
                  </div>
                </div>

                {/* ส่วนที่ 4 ถูกตั้งค่า break-inside-avoid */}
                <div className="mb-4 mt-4 break-inside-avoid">
                  <h3 className="text-[18pt] font-bold mb-1">ส่วนที่ ๔ การสรุปผลการประเมินทั้งปี</h3>
                  <table className="w-full border-collapse border border-black mt-1">
                    <thead>
                      <tr className="bg-gray-100 text-center font-bold">
                        <th className="border border-black p-1">องค์ประกอบการประเมิน</th>
                        <th className="border border-black p-1 w-32">คะแนนเฉลี่ย (ก)</th>
                        <th className="border border-black p-1 w-32">น้ำหนัก (ข) %</th>
                        <th className="border border-black p-1 w-40">รวมคะแนน (ก)X(ข)</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td className="border border-black p-1 pl-4">ผลการประเมินด้านผลสัมฤทธิ์ของงาน</td>
                        <td className="border border-black p-1 text-center">{data.kpiScoreFinal ? data.kpiScoreFinal.toFixed(2) : '-'}</td>
                        <td className="border border-black p-1 text-center">70</td>
                        <td className="border border-black p-1 text-center font-bold">
                          {data.kpiScoreFinal ? (data.kpiScoreFinal * 0.7).toFixed(2) : '-'}
                        </td>
                      </tr>
                      <tr>
                        <td className="border border-black p-1 pl-4">ผลการประเมินด้านพฤติกรรมการปฏิบัติงาน</td>
                        <td className="border border-black p-1 text-center">{data.behaviorScoreFinal ? data.behaviorScoreFinal.toFixed(2) : '-'}</td>
                        <td className="border border-black p-1 text-center">30</td>
                        <td className="border border-black p-1 text-center font-bold">
                          {data.behaviorScoreFinal ? (data.behaviorScoreFinal * 0.3).toFixed(2) : '-'}
                        </td>
                      </tr>
                      <tr className="bg-gray-100 font-bold">
                        <td colSpan={2} className="border border-black p-1 text-right pr-4">รวมคะแนนสุทธิ</td>
                        <td className="border border-black p-1 text-center">100</td>
                        <td className="border border-black p-1 text-center text-[18pt]">{data.totalScore ? data.totalScore.toFixed(2) : '-'}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                <div className="mb-4 border border-black p-2 text-center bg-gray-50 break-inside-avoid">
                  <p className="font-bold mb-1">ระดับผลการประเมิน</p>
                  <div className="flex justify-between items-center px-2 text-[15pt]">
                    <span className={data.grade === 'ดีเด่น' ? 'font-bold underline' : ''}>[ {data.grade === 'ดีเด่น' ? '✓' : '  '} ] ดีเด่น (90-100%)</span>
                    <span className={data.grade === 'ดีมาก' ? 'font-bold underline' : ''}>[ {data.grade === 'ดีมาก' ? '✓' : '  '} ] ดีมาก (80-89%)</span>
                    <span className={data.grade === 'ดี' ? 'font-bold underline' : ''}>[ {data.grade === 'ดี' ? '✓' : '  '} ] ดี (70-79%)</span>
                    <span className={data.grade === 'พอใช้' ? 'font-bold underline' : ''}>[ {data.grade === 'พอใช้' ? '✓' : '  '} ] พอใช้ (60-69%)</span>
                    <span className={data.grade === 'ต้องปรับปรุง' ? 'font-bold underline' : ''}>[ {data.grade === 'ต้องปรับปรุง' ? '✓' : '  '} ] ปรับปรุง ({'<'}60%)</span>
                  </div>
                </div>

                <div className="mb-6 break-inside-avoid">
                  <p className="font-bold mb-1">ความคิดเห็นเพิ่มเติมของผู้ประเมิน</p>
                  <div className="w-full border-b border-dotted border-gray-400 min-h-[1.5rem] leading-6 italic">
                    {data.comments || "ไม่มีความคิดเห็นเพิ่มเติม"}
                  </div>
                  <div className="w-full border-b border-dotted border-gray-400 mt-4"></div>
                </div>

                {/* ส่วนลายเซ็น ถูกป้องกันการตัดครึ่งเวลาพิมพ์ ถ้าที่ไม่พอมันจะปัดลงหน้า 2 ทันที */}

                    {/* 1. ผู้รับการประเมิน */}

                      <p className="mb-8">ผู้รับการประเมินได้รับทราบผลการประเมินแล้ว</p>
                      <div className="border-b border-dotted border-black w-3/4 mx-auto mb-1"></div>
                      <p>( {data.employeeName || data.name} )</p>
                      <p className="">ตำแหน่ง {data.position}</p>
                      <p className="">วันที่ ......../......../..........</p>
                    </div>

                    {/* 2. ผู้ประเมิน (ผู้บังคับบัญชาชั้นต้น) */}
                    <div className="text-center">
                      <p className="mb-8">ผู้ประเมิน</p>
                      <div className="border-b border-dotted border-black w-3/4 mx-auto mb-1"></div>
                      <p>( {data.evaluatorName || '...........................................'} )</p>
                      <p className="">ตำแหน่ง ผู้บังคับบัญชาชั้นต้น</p>
                      <p className="">วันที่ ......../......../..........</p>
                    </div>
                    
                    {/* 3. หัวหน้ากลุ่มงาน */}
                    <div className="text-center">
